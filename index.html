<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মিষ্টি আম - ইনকাম</title>
    <style>
        body { font-family: sans-serif; background: #fff5f8; text-align: center; padding: 15px; }
        .box { background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 380px; margin: auto; }
        .balance { font-size: 32px; font-weight: bold; color: #d35400; margin: 10px 0; }
        button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .ad-btn { background: #27ae60; color: #fff; }
        .wa-btn { background: #25d366; color: #fff; text-decoration: none; display: block; padding: 10px; margin-top: 5px; border-radius: 5px; }
        .tg-btn { background: #0088cc; color: #fff; text-decoration: none; display: block; padding: 10px; margin-top: 5px; border-radius: 5px; }
    </style>
</head>
<body onload="checkBonus()">
<div class="box">
    <h1>মিষ্টি আম 💰</h1>
    <div style="background: #fff8e1; border: 1px dashed orange; border-radius: 10px; padding: 10px;">
        <p>ব্যালেন্স: <span class="balance" id="bl">0</span> ৳</p>
        <p>আজকের অ্যাড: <span id="ac">0</span>/10</p>
    </div>
    <button id="ab" class="ad-btn" onclick="showAd()">📺 অ্যাড দেখুন (৫৳)</button>
    <p id="tm" style="display:none; color:red;">৫ সেকেন্ড অপেক্ষা করুন...</p>
    <button style="background: #2980b9; color:#fff;" onclick="wd()">💳 টাকা তুলুন</button>
    <div style="margin-top:20px; background:#f0f4f1; padding:10px; border-radius:10px;">
        <strong>🎁 রেফার বোনাস (১০৳)</strong>
        <a id="wa" href="#" class="wa-btn">WhatsApp-এ শেয়ার</a>
        <a id="tg" href="#" class="tg-btn">Telegram-এ শেয়ার</a>
    </div>
</div>

<script>
    const links = ["https://omg10.com/4/10677665", "https://omg10.com/4/10678359"];
    
    // ব্যালেন্স লোড করা
    let b = localStorage.getItem('b') ? parseInt(localStorage.getItem('b')) : 0;
    let a = localStorage.getItem('a') ? parseInt(localStorage.getItem('a')) : 0;

    function checkBonus() {
        // নতুন অ্যাকাউন্ট খুললে ৫০ টাকা ফ্রি
        if (!localStorage.getItem('joined')) {
            b = 50;
            localStorage.setItem('joined', 'true');
            up();
            alert("অ্যাকাউন্ট খোলার জন্য ৫০ টাকা বোনাস পেয়েছেন!");
        }
        
        // রেফার লিঙ্ক চেক (যে রেফার করেছে তার জন্য ১০ টাকা)
        const p = new URLSearchParams(window.location.search);
        if (p.has('ref')) {
            // সত্যিকারের সার্ভার ছাড়া রেফারারকে টাকা দেওয়া কঠিন, 
            // তাই এটি একটি ডেমো পপআপ দেখাবে।
            alert("আপনি বন্ধুর রেফারে জয়েন করেছেন!");
        }
    }

    // রেফার লিঙ্ক তৈরি
    let refL = window.location.href.split('?')[0] + "?ref=" + Math.floor(Math.random() * 1000);
    document.getElementById('wa').href = "https://api.whatsapp.com/send?text=একাউন্ট খুললেই ৫০ টাকা ফ্রি! লিঙ্কে ক্লিক করো: " + refL;
    document.getElementById('tg').href = "https://telegram.me/share/url?url=" + refL + "&text=৫০ টাকা বোনাস নিন!";

    function showAd() {
        if (a >= 10) { alert("আজকের লিমিট শেষ!"); return; }
        document.getElementById('ab').disabled = true;
        document.getElementById('tm').style.display = 'block';
        window.open(links[a % 2], '_blank');
        setTimeout(() => {
            b += 5; a += 1; up();
            document.getElementById('ab').disabled = false;
            document.getElementById('tm').style.display = 'none';
            alert("৫ টাকা যোগ হয়েছে!");
        }, 5000);
    }

    function wd() {
        if (b < 500) alert("৫০০ টাকা হলে তোলা যাবে।");
        else { let n = prompt("বিকাশ নাম্বার দিন:"); if(n) alert("রিকোয়েস্ট সফল!"); }
    }

    function up() {
        localStorage.setItem('b', b); localStorage.setItem('a', a);
        document.getElementById('bl').innerText = b; document.getElementById('ac').innerText = a;
    }
    up();
</script>
</body>
</html>
