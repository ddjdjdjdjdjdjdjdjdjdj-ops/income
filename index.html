<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মিষ্টি আম আর্নিং</title>
    <script type="text/javascript" src="https://getafilenow.com/script_include.php?id=1881500"></script>
    
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; text-align: center; margin: 0; padding: 0; }
        .header { background-color: #ff9800; color: white; padding: 20px; font-size: 24px; font-weight: bold; }
        .balance-card { background: white; margin: 20px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .points { font-size: 32px; color: #ff9800; font-weight: bold; margin: 10px 0; }
        .taka { font-size: 20px; color: #4caf50; font-weight: bold; }
        .btn-withdraw { background-color: #ccc; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 30px; cursor: not-allowed; display: inline-block; margin-top: 20px; width: 80%; }
        .btn-active { background-color: #4caf50; cursor: pointer; }
        .btn-work { background-color: #2196F3; color: white; padding: 15px; border-radius: 10px; text-decoration: none; display: block; margin: 10px auto; width: 70%; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">🥭 মিষ্টি আম আর্নিং</div>

    <div class="balance-card">
        <div class="balance-title">আপনার বর্তমান ব্যালেন্স</div>
        <div class="points" id="userPoints">0.00 Points</div>
        <div class="taka" id="userTaka">৳ 0.00 Taka</div>
        <p style="font-size: 12px; color: #666;">(১০০ পয়েন্ট = ৪০ টাকা)</p>
        
        <button id="withdrawBtn" class="btn-withdraw" onclick="requestPayment()" disabled>পেমেন্ট নিন (বিকাশ/নগদ)</button>
    </div>

    <a href="javascript:void(0);" onclick="call_locker();" class="btn-work">🚀 আনলিমিটেড কাজ শুরু করুন</a>

    <script>
        // আপনার শর্ত: ১০০ পয়েন্ট = ৪০ টাকা (১ পয়েন্ট = ০.৪ টাকা)
        let points = 250; // এখানে আপনার ফায়ারবেস বা ডাটাবেস থেকে পয়েন্ট আসবে
        let currentTaka = points * 0.4;

        function updateDisplay() {
            document.getElementById('userPoints').innerText = points.toFixed(2) + " Points";
            document.getElementById('userTaka').innerText = "৳ " + currentTaka.toFixed(2) + " Taka";

            let btn = document.getElementById('withdrawBtn');
            if (currentTaka >= 100) {
                btn.classList.add('btn-active');
                btn.disabled = false;
            }
        }

        function requestPayment() {
            let number = prompt("আপনার বিকাশ বা নগদ নম্বরটি দিন:");
            if (number) {
                // এখানে আপনার টেলিগ্রাম মেসেজ পাঠানোর কোডটি বসবে
                alert(number + " নম্বরে আপনার পেমেন্ট রিকোয়েস্ট পাঠানো হয়েছে!");
            }
        }

        updateDisplay();
    </script>
</body>
</html>
