<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>X World</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f1f1f1;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:red;
color:white;
}

.search input{
padding:6px;
border:none;
}

#videos{
padding:20px;
}

video{
width:100%;
margin-bottom:20px;
}

</style>

</head>

<body>

<header class="header">

<h2>X World</h2>

<div class="search">

<input id="search" placeholder="Search video or username">

<button>🔍</button>

</div>

<div id="user"></div>

</header>

<div id="videos"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
authDomain: "misti-am.firebaseapp.com",
projectId: "misti-am",
storageBucket: "misti-am.firebasestorage.app",
messagingSenderId: "335857181187",
appId: "1:335857181187:web:ce34124f9daea3a4262436"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

signInWithPopup(auth,provider)

.then(result=>{

const user=result.user;

document.getElementById("user").innerHTML=
`
<img src="${user.photoURL}" width="35" style="border-radius:50%">
`;

})

async function loadVideos(){

const querySnapshot = await getDocs(collection(db,"videos"));

let html="";

querySnapshot.forEach(doc=>{

html+=`

<div>

<h3>${doc.data().title}</h3>

<video controls>

<source src="${doc.data().url}">

</video>

</div>

`;

});

document.getElementById("videos").innerHTML=html;

}

loadVideos();

</script>

</body>

</html>
