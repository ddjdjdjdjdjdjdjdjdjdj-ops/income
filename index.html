<!DOCTYPE html>
<html lang="bn">
<head>

    <title>Misti AM Earning</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Misti AM</h1>
            <div class="balance-card">
                <p>Balance: <span id="balance">0</span> Taka</p>
            </div>
        </div>

        <div class="ad-grid" id="adGrid">
            </div>

        <div class="action-card">
            <h3>Refer kore 10 taka income korun</h3>
            <div class="share-group">

            </div>
            
            <hr class="divider">
            
            <button onclick="joinTelegram()" class="btn-join">
                Telegram Channel-e Join kore 10 Taka Nin
            </button>
            <p class="channel-link">@mistiam5</p>
        </div>
    </div>

    <script src="script.js"></script>
