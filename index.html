<!DOCTYPE html>
<html>
<head>
    <title>X World - Video App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding-bottom: 60px; background: #f9f9f9; }
        header { display: flex; justify-content: space-between; padding: 15px; background: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; }
        .search-icon { font-size: 20px; cursor: pointer; }
        .video-card { background: #fff; margin-bottom: 10px; border-radius: 8px; overflow: hidden; }
        .thumbnail { width: 100%; height: 200px; background: #ccc; object-fit: cover; }
        .video-info { padding: 10px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; font-size: 12px; color: #555; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 20px; color: red;">X World</div>
    <div class="search-icon">🔍</div>
</header>

<div class="video-list" id="videoContainer">
    <div class="video-card">
        <img src="thumb-sample.jpg" class="thumbnail">
        <div class="video-info">
            <h3 style="margin: 5px 0;">ভিডিওর টাইটেল এখানে থাকবে</h3>
            <p style="font-size: 14px; color: #777;">ইউজার নেম • ২ দিন আগে</p>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item">🎬<br>Videos</div>
    <div class="nav-item">👤<br>Profile</div>
</div>

</body>
</html>
