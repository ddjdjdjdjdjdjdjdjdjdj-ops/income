<!DOCTYPE html>
<html>

<head>

<title>Upload Video</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:20px;
}

input{
margin:10px;
}

button{
padding:10px;
background:red;
color:white;
border:none;
}

</style>

</head>

<body>

<h2>Upload Video</h2>

<input id="title" placeholder="Video title">

<br>

<input type="file" id="video">

<br>

<button onclick="upload()">Upload</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

const firebaseConfig = {

apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
authDomain: "misti-am.firebaseapp.com",
projectId: "misti-am",
storageBucket: "misti-am.firebasestorage.app",
messagingSenderId: "335857181187",
appId: "1:335857181187:web:ce34124f9daea3a4262436"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

window.upload = async function(){

const title=document.getElementById("title").value
const file=document.getElementById("video").files[0]

const storageRef = ref(storage,"videos/"+file.name)

await uploadBytes(storageRef,file)

const url=await getDownloadURL(storageRef)

await addDoc(collection(db,"videos"),{

title:title,
url:url,
date:Date.now(),
views:0

})

alert("Video Uploaded!")

}

</script>

</body>

</html>
