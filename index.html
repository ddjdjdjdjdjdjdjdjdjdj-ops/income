<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মিষ্টি আম - ইনকাম</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #fff5f8; text-align: center; padding: 10px; margin-bottom: 50px; }
        .box { background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .balance-card { background: #fff8e1; border: 2px solid orange; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .balance { font-size: 30px; font-weight: bold; color: #d35400; }
        .ad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .ad-btn { background: #27ae60; color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .ad-btn:disabled { background: #bdc3c7; cursor: not-allowed; opacity: 0.8; }
        .wd-btn { background: #2980b9; color: #fff; width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; }
        .wd-btn:disabled { background: #ccc; }
        .sticky-footer { margin-top: 20px; background: #fff0f0; padding: 12px; border-radius: 15px; border: 2px solid #ff4d4d; }
        .tg-link { background: #0088cc; color: #fff; text-decoration: none; display: block; padding: 10px; margin-top: 8px; border-radius: 8px; font-weight: bold; }
        .condition-text { font-size: 13px; color: #d32f2f; font-weight: bold; line-height: 1.5; }
    </style>
</head>
<body>

<div class="box">
    <h1>মিষ্টি আম 💰</h1>
    <div class="balance-card">
        <p style="margin:0;">আপনার মোট ব্যালেন্স</p>
        <div class="balance"><span id="bl">0</span> ৳</div>
        <p style="margin:0; font-size: 12px; color: #666;">আইডি: #<span id="uid">...</span></p>
    </div>
    <strong style="color: #333;">📺 আজকের ১০টি অ্যাড:</strong>
    <div class="ad-grid" id="adGrid"></div>
    <button id="wb" class="wd-btn" onclick="wd()" disabled>💳 টাকা তুলুন (মিনিমাম ৫০০৳)</button>
    <div class="sticky-footer">
        <p class="condition-text">⚠️ পেমেন্ট পেতে আপনার ৫ জন বন্ধুকে আমাদের টেলিগ্রাম চ্যানেলে শেয়ার করুন।</p>
        <a href="https://t.me/mistiam5" target="_blank" class="tg-link">চ্যানেলে জয়েন করুন</a>
    </div>
</div>

<script>
    const adLinks = [
        "https://omg10.com/4/10692961","https://omg10.com/4/10692960","https://omg10.com/4/10692959",
        "https://omg10.com/4/10692957","https://omg10.com/4/10692956","https://omg10.com/4/10692955",
        "https://omg10.com/4/10692954","https://omg10.com/4/10692953","https://omg10.com/4/10677665",
        "https://omg10.com/4/10678359"
    ];

    let b = localStorage.getItem('b') ? parseInt(localStorage.getItem('b')) : 0;
    let myID = localStorage.getItem('myID') || Math.floor(100000 + Math.random() * 900000);
    localStorage.setItem('myID', myID);
    document.getElementById('uid').innerText = myID;

    // জয়েনিং বোনাস সেটআপ
    if (!localStorage.getItem('joined')) {
        b = 50;
        localStorage.setItem('b', b);
        localStorage.setItem('joined', 'true');
    }

    // বাটন তৈরি করার ফাংশন
    function createButtons() {
        const grid = document.getElementById('adGrid');
        const today = new Date().toDateString();
        grid.innerHTML = ""; // আগের বাটন ক্লিয়ার করা

        for (let i = 0; i < 10; i++) {
            const btn = document.createElement('button');
            btn.className = 'ad-btn';
            btn.innerText = `অ্যাড ${i + 1} (৫৳)`;
            
            if (localStorage.getItem(`ad_${i}`) === today) {
                btn.disabled = true;
                btn.innerText = "দেখা শেষ ✅";
            }

            btn.onclick = () => {
                window.open(adLinks[i], '_blank');
                setTimeout(() => {
                    b += 5;
                    localStorage.setItem(`ad_${i}`, today);
                    localStorage.setItem('b', b);
                    location.reload(); 
                }, 5000);
            };
            grid.appendChild(btn);
        }
        document.getElementById('bl').innerText = b;
        document.getElementById('wb').disabled = (b < 500);
    }

    function wd() {
        let num = prompt("আপনার বিকাশ বা নগদ নম্বর দিন:");
        if (num) {
            alert("সফল! ৫ জন শেয়ারের স্ক্রিনশট চ্যানেলে দিন।");
            b = 0;
            localStorage.setItem('b', b);
            location.reload();
        }
    }

    // সরাসরি কল করা যাতে টেলিগ্রামে মিস না হয়
    createButtons();
</script>
</body>
</html>
