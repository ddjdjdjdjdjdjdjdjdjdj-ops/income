<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misti Am - Income</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
            authDomain: "misti-am.firebaseapp.com",
            projectId: "misti-am",
            databaseURL: "https://misti-am-default-rtdb.firebaseio.com",
            appId: "1:335857181187:web:ce34124f9daea3a4262436"
        };
        firebase.initializeApp(firebaseConfig);
    </script>

    <style>
        body { font-family: 'Arial', sans-serif; background: #fff5f8; text-align: center; padding: 10px; color: #333; }
        .box { background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .balance-card { background: #fff8e1; border: 2px solid orange; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .balance { font-size: 32px; font-weight: bold; color: #d35400; }
        .ad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .ad-btn { background: #27ae60; color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .ad-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .action-section { background: #f0f7ff; padding: 15px; border-radius: 15px; margin-top: 20px; border: 1px solid #2196f3; }
        .wd-btn { background: #2980b9; color: #fff; width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .wd-btn:disabled { background: #bdc3c7; color: #666; cursor: not-allowed; }
        .share-btn { text-decoration: none; color: #fff; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 14px; display: block; cursor: pointer; margin-top: 10px; width: 100%; border: none; }
    </style>
</head>
<body>

<div class="box">
    <h1>Misti Am 🥭💰</h1>
    <div class="balance-card">
        <p style="margin:0;">Mot Balance</p>
        <div class="balance"><span id="bl">0</span> ৳</div>
        <p style="margin:0; font-size: 12px; color: #666;">ID: #<span id="uid">...</span></p>
    </div>

    <strong>📺 Ajker 10-ti Ad:</strong>
    <div id="adGrid" class="ad-grid"></div>

    <div class="action-section">
        <strong>📢 Refer & Share (10৳)</strong>
        <button onclick="shareWhatsApp()" class="share-btn" style="background: #25d366;">WhatsApp Share</button>
        <button onclick="shareTelegram()" class="share-btn" style="background: #0088cc;">Telegram Share</button>
    </div>

    <div class="action-section" id="joinSection" style="background: #fff0f0; border-color: #ff4d4d;">
        <strong>🎁 Join Bonus 10৳</strong>
        <a href="https://t.me/mistiam5" target="_blank" class="share-btn" style="background:#0088cc;" onclick="giveJoinBonus()">Channel-e Join Kore 10৳ Nin</a>
    </div>

    <div class="action-section">
        <strong>💳 Withdrawal</strong>
        <input type="number" id="wdNumber" placeholder="Number din" style="width:90%; padding:10px; margin-top:5px; border-radius: 8px; border: 1px solid #ccc;">
        <button id="wb" class="wd-btn" onclick="processWD()" disabled>Withdraw (Min 500৳)</button>
    </div>
</div>

<script>
    const botToken = "7763993767:AAF8_u_Hq43Yc67sHk7H4mk3EkFIF8NFLFw";
    const chatID = "7621146681"; 

    const adLinks = [
        "https://omg10.com/4/10692961", "https://omg10.com/4/10692960", "https://omg10.com/4/10692959",
        "https://omg10.com/4/10692957", "https://omg10.com/4/10692956", "https://omg10.com/4/10692955",
        "https://omg10.com/4/10692954", "https://omg10.com/4/10692953", "https://omg10.com/4/10677665",
        "https://omg10.com/4/10678359"
    ];

    let b = localStorage.getItem('b') ? parseInt(localStorage.getItem('b')) : 0;
    let myID = localStorage.getItem('myID') || Math.floor(100000 + Math.random() * 900000);
    localStorage.setItem('myID', myID);
    document.getElementById('uid').innerText = myID;

    const refLink = `https://ddjdjdjdjdjdjdjdjdjdj-ops.github.io/income/?ref=${myID}`;

    function shareWhatsApp() {
        window.open(`https://wa.me/?text=${encodeURIComponent("Join korun ar 10tk bonus nin: " + refLink)}`);
    }

    function shareTelegram() {
        window.open(`https://t.me/share/url?url=${encodeURIComponent(refLink)}&text=${encodeURIComponent("Misti Am - Income Bot!")}`);
    }

    function giveJoinBonus() {
        if (!localStorage.getItem('joined')) {
            b += 10;
            updateBalance();
            localStorage.setItem('joined', 'true');
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatID}&text=${encodeURIComponent("🎁 User #"+myID+" channel-e join kore 10tk bonus niyeche!")}`);
            alert("10 tk bonus add hoyeche!");
            location.reload();
        }
    }

    function updateBalance() {
        localStorage.setItem('b', b);
        document.getElementById('bl').innerText = b;
        document.getElementById('wb').disabled = (b < 500);
    }

    function processWD() {
        const num = document.getElementById('wdNumber').value;
        if(!num) { alert("Number din!"); return; }
        const text = `💰 New Withdraw Request!\nID: #${myID}\nNumber: ${num}\nAmount: ${b} ৳`;
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatID}&text=${encodeURIComponent(text)}`)
        .then(() => {
            alert("Request Telegram-e pathano hoyeche!");
            b = 0;
            updateBalance();
            location.reload();
        });
    }

    function createButtons() {
        const grid = document.getElementById('adGrid');
        const today = new Date().toDateString();
        for (let i = 0; i < 10; i++) {
            const btn = document.createElement('button');
            btn.className = 'ad-btn';
            btn.innerText = `Ad ${i + 1}`;
            if (localStorage.getItem(`ad_${i}`) === today) { btn.disabled = true; btn.innerText = "Done ✅"; }
            btn.onclick = () => {
                window.open(adLinks[i], '_blank');
                setTimeout(() => {
                    b += 5;
                    localStorage.setItem(`ad_${i}`, today);
                    updateBalance();
                    location.reload();
                }, 5000);
            };
            grid.appendChild(btn);
        }
        updateBalance();
        if(localStorage.getItem('joined')) document.getElementById('joinSection').style.display = 'none';
    }
    createButtons();
</script>
</body>
            </html>
