<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>X World - Master Admin</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 20px; }
        .dashboard { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #fff; padding: 20px; border-radius: 10px; flex: 1; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat-card h2 { color: #007bff; margin: 10px 0; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="stat-card">
        <span>মোট ইউজার (Total Users)</span>
        <h2 id="total-users">0</h2>
    </div>
    <div class="stat-card">
        <span>মোট অ্যাপ (Total Apps)</span>
        <h2 id="total-apps">0</h2>
    </div>
</div>

<div class="container">
    <h2>নতুন অ্যাপ যোগ করুন (সিরিয়াল অনুযায়ী)</h2>
    <input type="number" id="app-id" placeholder="সিরিয়াল নম্বর (যেমন: ১, ২, ৩)">
    <input type="text" id="app-name" placeholder="অ্যাপের নাম">
    <input type="text" id="app-link" placeholder="MyLead ট্র্যাকিং লিঙ্ক">
    <input type="number" id="app-reward" placeholder="পুরস্কারের টাকা (যেমন: ১০)">
    <button onclick="addApp()">অ্যাপ সেভ করুন</button>

    <hr>

    <h3>পেন্ডিং নগদ উইথড্র লিস্ট</h3>
    <table>
        <thead>
            <tr>
                <th>নম্বর</th>
                <th>টাকা</th>
                <th>অ্যাকশন</th>
            </tr>
        </thead>
        <tbody id="payment-list"></tbody>
    </table>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    // আপনার Firebase Config (আগের মতো)
    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:4dc1f6ca2b79e1e0262436"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ১. ইউজার সংখ্যা গণনা করা
    db.collection("users").onSnapshot(snap => {
        document.getElementById('total-users').innerText = snap.size;
    });

    // ২. অ্যাপ সংখ্যা গণনা করা
    db.collection("apps").onSnapshot(snap => {
        document.getElementById('total-apps').innerText = snap.size;
    });

    // ৩. সিরিয়াল অনুযায়ী অ্যাপ যোগ করা
    function addApp() {
        const id = document.getElementById('app-id').value;
        const name = document.getElementById('app-name').value;
        const link = document.getElementById('app-link').value;
        const reward = document.getElementById('app-reward').value;

        if(!id || !name || !link) return alert("সব ঘর পূরণ করুন!");

        db.collection("apps").add({
            id: parseInt(id), // এটি আপনার ১, ২, ৩ সিরিয়াল নিশ্চিত করবে
            name: name,
            link: link,
            reward: parseInt(reward)
        }).then(() => {
            alert("অ্যাপ সফলভাবে সিরিয়াল নম্বর " + id + "-এ যোগ হয়েছে!");
            document.getElementById('app-id').value = parseInt(id) + 1; // পরের সিরিয়াল অটো বসানো
            document.getElementById('app-name').value = "";
            document.getElementById('app-link').value = "";
        });
    }

    // ৪. পেমেন্ট লিস্ট দেখানো
    db.collection("withdrawals").where("status", "==", "pending").onSnapshot(snap => {
        const list = document.getElementById('payment-list');
        list.innerHTML = "";
        snap.forEach(doc => {
            const data = doc.data();
            list.innerHTML += `
                <tr>
                    <td>${data.phone}</td>
                    <td>${data.amount} TK</td>
                    <td><button onclick="approve('${doc.id}')" style="background:#28a745; width:auto; padding:5px 10px;">Done</button></td>
                </tr>`;
        });
    });

    function approve(id) {
        db.collection("withdrawals").doc(id).update({ status: "success" })
        .then(() => alert("পেমেন্ট সম্পন্ন হয়েছে!"));
    }
</script>
</body>
</html>
