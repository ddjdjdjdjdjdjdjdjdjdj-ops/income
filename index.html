<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মিষ্টি আম - ইনকাম সাইট</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fce4ec; text-align: center; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .logo { width: 80px; }
        h1 { color: #e65100; margin: 10px 0; }
        .balance-box { border: 2px dashed #ffb74d; padding: 15px; border-radius: 15px; background: #fff8e1; margin: 20px 0; }
        .amount { font-size: 30px; font-weight: bold; color: #e65100; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .ad-btn { background-color: #4caf50; color: white; }
        .ad-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .withdraw-btn { background-color: #1e88e5; color: white; }
        .refer-box { margin-top: 20px; padding: 10px; background: #f1f8e9; border-radius: 10px; font-size: 14px; }
        #timerText { color: #d32f2f; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://cdn-icons-png.flaticon.com/512/3137/3137044.png" alt="Mango" class="logo">
    <h1>মিষ্টি আম 💰</h1>
    
    <div class="balance-box">
        <div>আপনার বর্তমান ব্যালেন্স</div>
        <div class="amount"><span id="balance">0</span> ৳</div>
        <div style="margin-top: 10px;">আজকের অ্যাড: <span id="adCount">0</span>/10</div>
    </div>

    <button id="adBtn" class="ad-btn" onclick="showAd()">📺 অ্যাড দেখুন (৫৳)</button>
    <p id="timerText" style="display:none;">পরবর্তী অ্যাড <span id="timer">5</span> সেকেন্ড পর...</p>

    <button class="withdraw-btn" onclick="withdraw()">💳 টাকা তুলুন (Withdraw)</button>

    <div class="refer-box">
        <strong>🎁 রেফার বোনাস:</strong><br>
        বন্ধুকে রেফার করলেই ১০৳ বোনাস!<br>
        <button onclick="referFriend()" style="padding: 5px; margin-top: 5px; background: #81c784; width: auto; color: white;">রেফার লিঙ্ক কপি করুন</button>
    </div>
</div>

<script>
    // আপনার দেওয়া অ্যাড লিঙ্ক দুটি এখানে সেট করা হয়েছে
    const adLinks = [
        "https://omg10.com/4/10677665",
        "https://omg10.com/4/10678359"
    ];

    let balance = localStorage.getItem('balance') ? parseInt(localStorage.getItem('balance')) : 0;
    let adCount = localStorage.getItem('adCount') ? parseInt(localStorage.getItem('adCount')) : 0;

    document.getElementById('balance').innerText = balance;
    document.getElementById('adCount').innerText = adCount;

    function showAd() {
        if (adCount >= 10) {
            alert("আজকের ১০টি অ্যাড দেখা শেষ! কাল আবার চেষ্টা করুন।");
            return;
        }

        let btn = document.getElementById('adBtn');
        let timerText = document.getElementById('timerText');
        let timerDisplay = document.getElementById('timer');
        
        btn.disabled = true;
        timerText.style.display = 'block';
        
        // পর্যায়ক্রমে আপনার লিঙ্ক দুটি ওপেন হবে
        let currentAd = adLinks[adCount % adLinks.length];
        window.open(currentAd, '_blank');

        let timeLeft = 5;
        let countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                balance += 5;
                adCount += 1;
                updateUI();
                btn.disabled = false;
                timerText.style.display = 'none';
                timerDisplay.innerText = 5;
                alert("অভিনন্দন! ৫ টাকা যোগ হয়েছে।");
            }
        }, 1000);
    }

    function withdraw() {
        if (balance < 500) {
            alert("মিনিমাম ৫০০ টাকা হলে উইথড্র করতে পারবেন।");
        } else {
            let num = prompt("আপনার বিকাশ বা নগদ নাম্বার দিন:");
            if (num) {
                alert("উইথড্র রিকোয়েস্ট সফল! আমরা আপনার নাম্বারে টাকা পাঠিয়ে দেব।");
            }
        }
    }

    function referFriend() {
        navigator.clipboard.writeText(window.location.href);
        alert("লিঙ্ক কপি হয়েছে! বন্ধুদের পাঠিয়ে ইনকাম করুন।");
        
        let confirmRefer = confirm("বন্ধু কি জয়েন করেছে? করলে ১০৳ বোনাস নিতে OK চাপুন।");
        if (confirmRefer) {
            balance += 10;
            updateUI();
            alert("১০ টাকা রেফার বোনাস যোগ হয়েছে!");
        }
    }

    function updateUI() {
        localStorage.setItem('balance', balance);
        localStorage.setItem('adCount', adCount);
        document.getElementById('balance').innerText = balance;
        document.getElementById('adCount').innerText = adCount;
    }
</script>

</body>
</html>
