<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মিষ্টি AM - ইনকাম করুন</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header-card">
        <h1>মিষ্টি AM</h1>
        <div class="balance-box">
            ব্যালেন্স: <span id="balance">0</span> টাকা
        </div>
    </div>

    <div id="adGrid" class="ad-grid"></div>

    <div class="withdraw-section">
        <h3>টাকা উত্তোলন</h3>
        <select id="paymentMethod">
            <option value="Bkash">বিকাশ (Bkash)</option>
            <option value="Nagad">নগদ (Nagad)</option>
        </select>
        <input type="text" id="withdrawNumber" placeholder="নাম্বার দিন">
        <input type="number" id="withdrawAmount" placeholder="টাকার পরিমাণ">
        <button onclick="withdrawMoney()" id="withdrawBtn">টাকা তুলুন</button>
    </div>

    <div class="refer-section">
        <h3>রেফার অপশন</h3>
        <button onclick="share('whatsapp')" style="background:#25D366">WhatsApp Refer</button>
        <button onclick="share('telegram')" style="background:#0088cc">Telegram Refer</button>
        <p>রেফার করে ১০ টাকা ইনকাম করুন</p>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
