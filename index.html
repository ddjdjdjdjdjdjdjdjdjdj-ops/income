<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মিষ্টি আম - ইনকাম</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Arial', sans-serif; background: #fff5f8; text-align: center; padding: 10px; margin-bottom: 50px; color: #333; }
        .box { background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .balance-card { background: #fff8e1; border: 2px solid orange; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .balance { font-size: 32px; font-weight: bold; color: #d35400; }
        .ad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .ad-btn { background: #27ae60; color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .ad-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .action-section { background: #f0f7ff; padding: 15px; border-radius: 15px; margin-top: 20px; border: 1px solid #2196f3; }
        select, input { width: 90%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        .wd-btn { background: #2980b9; color: #fff; width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .wd-btn:disabled { background: #bdc3c7; color: #666; cursor: not-allowed; }
        .support-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .sup-btn { text-decoration: none; color: #fff; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <h1>মিষ্টি আম 🥭💰</h1>
    <div class="balance-card">
        <p style="margin:0;">মোট ব্যালেন্স</p>
        <div class="balance"><span id="bl">0</span> ৳</div>
        <p style="margin:0; font-size: 12px; color: #666;">আইডি: #<span id="uid">...</span></p>
    </div>

    <strong>📺 আজকের ১০টি অ্যাড:</strong>
    <div id="adGrid" class="ad-grid"></div>

    <div class="action-section">
        <strong>📢 রেফার করে ১০৳ ইনকাম</strong>
        <p style="font-size: 11px; margin: 5px 0;">রেফার লিঙ্কে কেউ জয়েন করলেই পাবেন ১০৳ বোনাস!</p>
        <button class="wd-btn" style="background: #2196f3;" onclick="copyRef()">রেফার লিঙ্ক কপি করুন</button>
    </div>

    <div class="action-section" id="joinSection" style="background: #fff0f0; border-color: #ff4d4d;">
        <strong>🎁 জয়েন বোনাস ১০৳</strong>
        <a href="https://t.me/mistiam5" target="_blank" style="background:#0088cc;" class="sup-btn" onclick="giveJoinBonus()">চ্যানেলে জয়েন করে বোনাস নিন</a>
    </div>

    <div class="action-section">
        <strong>💳 টাকা উত্তোলন (উইথড্র)</strong>
        <p style="font-size: 11px; color: #d32f2f;">মিনিমাম ৫০০ টাকা হলে বাটন চালু হবে।</p>
        <select id="method">
            <option value="bKash">বিকাশ (Personal)</option>
            <option value="Nagad">নগদ (Personal)</option>
        </select>
        <input type="number" id="wdNumber" placeholder="নম্বর দিন">
        <input type="number" id="wdAmount" placeholder="টাকার পরিমাণ">
        <button id="wb" class="wd-btn" onclick="processWD()" disabled>টাকা উত্তোলন করুন</button>
    </div>

    <div class="support-grid">
        <a href="https://wa.me/YOUR_NUMBER" class="sup-btn" style="background: #25d366;">WhatsApp সাপোর্ট</a>
        <a href="https://t.me/mistiam5" class="sup-btn" style="background: #0088cc;">Telegram চ্যানেল</a>
    </div>
</div>

<script>
    // আপনার বটের তথ্য
    const botToken = "7763993767:AAF8_u_Hq43Yc67sHk7H4mk3EkFIF8NFLFw";
    const chatID = "7621146681"; 

    const adLinks = [
        "https://omg10.com/4/10692961", "https://omg10.com/4/10692960", "https://omg10.com/4/10692959",
        "https://omg10.com/4/10692957", "https://omg10.com/4/10692956", "https://omg10.com/4/10692955",
        "https://omg10.com/4/10692954", "https://omg10.com/4/10692953", "https://omg10.com/4/10677665",
        "https://omg10.com/4/10678359"
    ];

    let b = localStorage.getItem('b') ? parseInt(localStorage.getItem('b')) : 0;
    let myID = localStorage.getItem('myID') || Math.floor(100000 + Math.random() * 900000);
    localStorage.setItem('myID', myID);
    document.getElementById('uid').innerText = myID;

    // রেফারেল চেক ও টেলিগ্রাম নোটিফিকেশন
    const urlParams = new URLSearchParams(window.location.search);
    const refBy = urlParams.get('ref');
    if (refBy && !localStorage.getItem('refUsed')) {
        const msg = `🎊 অভিনন্দন! আপনার রেফারেল #${myID} সাইটে জয়েন করেছে। ১০৳ অ্যাড করে দিন।`;
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatID}&text=${encodeURIComponent(msg)}`);
        localStorage.setItem('refUsed', 'true');
    }

    function giveJoinBonus() {
        if (!localStorage.getItem('joined')) {
            b += 10;
            localStorage.setItem('b', b);
            localStorage.setItem('joined', 'true');
            alert("১০ টাকা জয়েন বোনাস যোগ হয়েছে!");
            location.reload();
        }
    }

    function copyRef() {
        const link = `https://ddjdjdjdjdjdjdjdjdjdj-ops.github.io/income/?ref=${myID}`;
        navigator.clipboard.writeText(link);
        alert("আপনার রেফার লিঙ্ক কপি হয়েছে!");
    }

    function processWD() {
        const method = document.getElementById('method').value;
        const num = document.getElementById('wdNumber').value;
        const am = document.getElementById('wdAmount').value;
        if (!num || am < 500 || b < am) {
            alert("সঠিক তথ্য দিন। ব্যালেন্স চেক করুন।");
            return;
        }
        const text = `💰 উইথড্র রিকোয়েস্ট!\nআইডি: #${myID}\nমেথড: ${method}\nনম্বর: ${num}\nপরিমাণ: ${am} ৳`;
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatID}&text=${encodeURIComponent(text)}`)
        .then(() => {
            alert("রিকোয়েস্ট আপনার টেলিগ্রামে পাঠানো হয়েছে!");
            b -= am;
            localStorage.setItem('b', b);
            location.reload();
        });
    }

    function createButtons() {
        const grid = document.getElementById('adGrid');
        const today = new Date().toDateString();
        for (let i = 0; i < 10; i++) {
            const btn = document.createElement('button');
            btn.className = 'ad-btn';
            btn.innerText = `অ্যাড ${i + 1}`;
            if (localStorage.getItem(`ad_${i}`) === today) { btn.disabled = true; btn.innerText = "শেষ ✅"; }
            btn.onclick = () => {
                window.open(adLinks[i], '_blank');
                setTimeout(() => {
                    b += 5;
                    localStorage.setItem(`ad_${i}`, today);
                    localStorage.setItem('b', b);
                    location.reload();
                }, 5000);
            };
            grid.appendChild(btn);
        }
        document.getElementById('bl').innerText = b;
        if (b >= 500) document.getElementById('wb').disabled = false;
        if(localStorage.getItem('joined')) document.getElementById('joinSection').style.display = 'none';
    }
    createButtons();
</script>
</body>
            </html>
