<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মিষ্টি আম - ইনকাম</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
            authDomain: "misti-am.firebaseapp.com",
            projectId: "misti-am",
            storageBucket: "misti-am.firebasestorage.app",
            messagingSenderId: "335857181187",
            appId: "1:335857181187:web:ce34124f9daea3a4262436",
            measurementId: "G-2DEXZT0L85"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        auth.signInAnonymously().catch(e => console.log(e));
    </script>

    <style>
        body { font-family: 'Arial', sans-serif; background: #fff5f8; text-align: center; padding: 10px; margin-bottom: 50px; }
        .box { background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .balance-card { background: #fff8e1; border: 2px solid orange; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .balance { font-size: 30px; font-weight: bold; color: #d35400; }
        .ad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .ad-btn { background: #27ae60; color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .ad-btn:disabled { background: #bdc3c7; }
        .wd-section { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-top: 20px; border: 1px solid #ddd; }
        select, input { width: 90%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        .wd-btn { background: #2980b9; color: #fff; width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .sticky-footer { margin-top: 20px; background: #fff0f0; padding: 12px; border-radius: 15px; border: 2px solid #ff4d4d; }
        .tg-link { background: #0088cc; color: #fff; text-decoration: none; display: block; padding: 10px; margin-top: 8px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h1>মিষ্টি আম 🥭💰</h1>
    <div class="balance-card">
        <p style="margin:0;">মোট ব্যালেন্স</p>
        <div class="balance"><span id="bl">0</span> ৳</div>
        <p style="margin:0; font-size: 12px; color: #666;">আইডি: #<span id="uid">...</span></p>
    </div>

    <strong>📺 আজকের ১০টি অ্যাড:</strong>
    <div id="adGrid" class="ad-grid"></div>

    <div class="wd-section">
        <strong>💳 টাকা তুলুন</strong>
        <select id="method">
            <option value="bkash">বিকাশ (bKash)</option>
            <option value="nagad">নগদ (Nagad)</option>
        </select>
        <input type="number" id="wdNumber" placeholder="পার্সোনাল নম্বর দিন">
        <input type="number" id="wdAmount" placeholder="টাকার পরিমাণ (মিনিমাম ৫০০)">
        <button id="wb" class="wd-btn" onclick="processWD()" disabled>টাকা উত্তোলন করুন</button>
    </div>

    <div class="sticky-footer">
        <p style="font-size:13px; color:#d32f2f; font-weight:bold;">⚠️ পেমেন্ট পেতে আমাদের টেলিগ্রাম চ্যানেলে জয়েন থাকা বাধ্যতামূলক।</p>
        <a href="https://t.me/mistiam5" target="_blank" class="tg-link">চ্যানেলে জয়েন করুন</a>
    </div>
</div>

<script>
    // আপনার তথ্য
    const botToken = "7763993767:AAF8_u_Hq43Yc67sHk7H4mk3EkFIF8NFLFw"; 
    const chatID = "7621146681"; // রিয়াদ ভাই, এটি আপনার আইডি হিসেবে সেট করলাম। 

    const adLinks = [
        "https://omg10.com/4/10692961", "https://omg10.com/4/10692960", "https://omg10.com/4/10692959",
        "https://omg10.com/4/10692957", "https://omg10.com/4/10692956", "https://omg10.com/4/10692955",
        "https://omg10.com/4/10692954", "https://omg10.com/4/10692953", "https://omg10.com/4/10677665",
        "https://omg10.com/4/10678359"
    ];

    let b = localStorage.getItem('b') ? parseInt(localStorage.getItem('b')) : 50;
    let myID = localStorage.getItem('myID') || Math.floor(100000 + Math.random() * 900000);
    localStorage.setItem('myID', myID);
    document.getElementById('uid').innerText = myID;

    function createButtons() {
        const grid = document.getElementById('adGrid');
        const today = new Date().toDateString();
        grid.innerHTML = "";
        for (let i = 0; i < 10; i++) {
            const btn = document.createElement('button');
            btn.className = 'ad-btn';
            btn.innerText = `অ্যাড ${i + 1}`;
            if (localStorage.getItem(`ad_${i}`) === today) { btn.disabled = true; btn.innerText = "শেষ ✅"; }
            btn.onclick = () => {
                window.open(adLinks[i], '_blank');
                setTimeout(() => {
                    b += 5;
                    localStorage.setItem(`ad_${i}`, today);
                    localStorage.setItem('b', b);
                    location.reload(); 
                }, 5000);
            };
            grid.appendChild(btn);
        }
        document.getElementById('bl').innerText = b;
        document.getElementById('wb').disabled = (b < 500);
    }

    function processWD() {
        const method = document.getElementById('method').value;
        const number = document.getElementById('wdNumber').value;
        const amount = document.getElementById('wdAmount').value;
        
        if (!number || amount < 500) {
            alert("নম্বর দিন এবং মিনিমাম ৫০০ টাকা ব্যালেন্স থাকতে হবে।");
            return;
        }

        const text = `💰 নতুন উইথড্র রিকোয়েস্ট!\n\n👤 আইডি: #${myID}\n🏦 মেথড: ${method}\n📱 নম্বর: ${number}\n💵 পরিমাণ: ${amount} ৳`;

        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatID}&text=${encodeURIComponent(text)}`)
        .then(() => {
            alert("সফল! আপনার রিকোয়েস্ট টেলিগ্রামে পাঠানো হয়েছে।");
            b -= amount;
            localStorage.setItem('b', b);
            location.reload();
        })
        .catch(() => alert("Error: বটের সাথে কানেক্ট করা যাচ্ছে না।"));
    }
    createButtons();
</script>
</body>
    </html>
