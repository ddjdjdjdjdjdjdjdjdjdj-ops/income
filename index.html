<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মিষ্টি আম - অনলাইন ইনকাম</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 350px;
        }
        .logo { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; }
        h1 { color: #ff6f00; margin: 10px 0; }
        .balance-box {
            background: #fff3e0;
            padding: 15px;
            border-radius: 10px;
            border: 2px dashed #ffb74d;
            margin-bottom: 20px;
        }
        .balance-amount { font-size: 26px; font-weight: bold; color: #e65100; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }
        .ad1-btn { background: #4caf50; }
        .ad1-btn:disabled { background: #a5d6a7; cursor: not-allowed; }
        .ad2-btn { background: #ff5722; }
        .ad2-btn:disabled { background: #ffccbc; cursor: not-allowed; }
        .wd-btn { background: #2196f3; }
        .footer { font-size: 12px; color: #777; margin-top: 15px; }
        #timer { color: red; font-weight: bold; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://img.icons8.com/color/96/mango.png" alt="Logo" class="logo">
    <h1>মিষ্টি আম 💰</h1>
    
    <div class="balance-box">
        <p>আপনার বর্তমান ব্যালেন্স</p>
        <div class="balance-amount"><span id="balance">৫০</span> ৳</div>
    </div>

    <button id="btn1" class="btn ad1-btn" onclick="startAd('https://omg10.com/4/10678359', 'btn1')">📺 অ্যাড ১ (৫৳)</button>
    
    <button id="btn2" class="btn ad2-btn" onclick="startAd('https://omg10.com/4/10677665', 'btn2')">📺 অ্যাড ২ (৫৳)</button>
    
    <div id="timer">অপেক্ষা করুন: <span id="count">৫</span> সেকেন্ড</div>

    <button class="btn wd-btn" onclick="withdraw()">💳 টাকা তুলুন (Withdraw)</button>

    <p class="footer">মিনিমাম উইথড্র ৫০০ টাকা</p>
</div>

<script>
    let currentBalance = 50;

    function startAd(adUrl, btnId) {
        // নতুন ট্যাবে অ্যাড ওপেন হবে
        window.open(adUrl, '_blank');
        
        // টাইমার এবং বাটন ডিজেবল
        document.getElementById(btnId).disabled = true;
        document.getElementById('timer').style.display = 'block';
        let timeLeft = 5;
        
        let countdown = setInterval(function() {
            timeLeft--;
            document.getElementById('count').innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('timer').style.display = 'none';
                document.getElementById('count').innerText = 5;
                document.getElementById(btnId).disabled = false;
                
                // ব্যালেন্স যোগ
                currentBalance += 5;
                document.getElementById('balance').innerText = currentBalance;
                alert("অভিনন্দন! ৫ টাকা যোগ করা হয়েছে।");
            }
        }, 1000);
    }

    function withdraw() {
        if (currentBalance >= 500) {
            let num = prompt("আপনার বিকাশ/নগদ নাম্বার দিন:");
            if(num) alert("ধন্যবাদ! রিকোয়েস্ট জমা হয়েছে।");
        } else {
            alert("কমপক্ষে ৫০০ টাকা লাগবে।");
        }
    }
</script>

</body>
  </html>
