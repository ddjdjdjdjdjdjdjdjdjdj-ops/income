<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X World</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        body { font-family: Roboto, Arial, sans-serif; margin: 0; background: #fff; padding-bottom: 70px; }
        
        /* Top Header */
        header { position: sticky; top: 0; background: #fff; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; z-index: 100; }
        .logo { font-size: 22px; font-weight: bold; color: #000; letter-spacing: -1px; }
        .header-icons { display: flex; gap: 20px; font-size: 20px; }

        /* Video Feed */
        .video-card { width: 100%; margin-bottom: 20px; }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: #000; object-fit: cover; }
        .v-details { display: flex; padding: 12px; gap: 12px; }
        .v-avatar { width: 36px; height: 36px; border-radius: 50%; background: #eee; }
        .v-text { flex: 1; }
        .v-title { font-size: 16px; font-weight: 500; margin: 0 0 4px 0; line-height: 1.4; color: #0f0f0f; }
        .v-meta { font-size: 12px; color: #606060; }

        /* Bottom Navigation Bar (YouTube Style) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 55px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #e5e5e5; }
        .nav-item { text-align: center; font-size: 10px; color: #0f0f0f; cursor: pointer; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 2px; }
        .plus-icon { font-size: 35px !important; }

        /* Login Overlay */
        #loginOverlay { position: fixed; inset: 0; background: #fff; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; display: none; }
        .login-btn { padding: 10px 20px; background: #065fd4; color: #fff; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <h1 style="color:red">X World</h1>
    <p>ভিডিও দেখতে লগইন করুন</p>
    <button class="login-btn" onclick="login()">Sign in with Google</button>
</div>

<header>
    <div class="logo">X World</div>
    <div class="header-icons">
        <span>🔍</span>
        <span>🔔</span>
    </div>
</header>

<div id="videoFeed">
    </div>

<nav class="bottom-nav">
    <div class="nav-item" onclick="window.scrollTo(0,0)"><i>🏠</i>Home</div>
    <div class="nav-item"><i>🩳</i>Shorts</div>
    <div class="nav-item" onclick="document.getElementById('fileInput').click()">
        <i class="plus-icon">⊕</i>
    </div>
    <div class="nav-item"><i>📺</i>Subscriptions</div>
    <div class="nav-item" id="userBtn" onclick="showProfile()">
        <i id="userIcon">👤</i>You
    </div>
</nav>

<input type="file" id="fileInput" accept="video/*" style="display: none;" onchange="handleUpload(event)">

<script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
      authDomain: "misti-am.firebaseapp.com",
      projectId: "misti-am",
      storageBucket: "misti-am.firebasestorage.app",
      messagingSenderId: "335857181187",
      appId: "1:335857181187:web:ce34124f9daea3a4262436",
      measurementId: "G-2DEXZT0L85"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    // ১. অটো লগইন চেক
    auth.onAuthStateChanged(user => {
        if (!user) {
            document.getElementById('loginOverlay').style.display = 'flex';
        } else {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('userIcon').innerHTML = `<img src="${user.photoURL}" style="width:24px; border-radius:50%">`;
            loadVideos();
        }
    });

    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider);
    }

    // ২. ইউটিউব স্টাইলে ভিডিও আপলোড (টাইটেলসহ)
    async function handleUpload(event) {
        const file = event.target.files[0];
        const title = prompt("Enter video title:");
        if(!title || !file) return;

        alert("Uploading...");
        const ref = storage.ref(`videos/${Date.now()}`);
        await ref.put(file);
        const url = await ref.getDownloadURL();

        await db.collection("videos").add({
            title: title,
            url: url,
            uploader: auth.currentUser.displayName,
            avatar: auth.currentUser.photoURL,
            views: 0,
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("Upload Done!");
    }

    // ৩. ভিডিও ফিড লোড করা
    function loadVideos() {
        db.collection("videos").orderBy("time", "desc").onSnapshot(snap => {
            const feed = document.getElementById('videoFeed');
            feed.innerHTML = "";
            snap.forEach(doc => {
                const v = doc.data();
                feed.innerHTML += `
                    <div class="video-card">
                        <video class="thumbnail" src="${v.url}" controls></video>
                        <div class="v-details">
                            <img class="v-avatar" src="${v.avatar}">
                            <div class="v-text">
                                <p class="v-title">${v.title}</p>
                                <p class="v-meta">${v.uploader} • ${v.views} views</p>
                            </div>
                            <span style="font-size:20px">⋮</span>
                        </div>
                    </div>`;
            });
        });
    }

    function showProfile() {
        const user = auth.currentUser;
        alert(`Name: ${user.displayName}\nEmail: ${user.email}`);
    }
</script>

</body>
    </html>
